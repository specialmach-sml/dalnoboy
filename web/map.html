<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Dalnoboy Map</title>
  <style>
    body { margin:0; font-family:Arial; }
    #map { height:100vh; width:100vw; }
    #panel {
      position:absolute; top:16px; right:16px; z-index:1000;
      width:330px; max-height:86vh;
      background:white; border-radius:14px; padding:12px;
      box-shadow:0 6px 24px rgba(0,0,0,.28);
      font-size:14px;
    }
    #panelHeader {
      position:sticky; top:0; background:white; z-index:2;
      padding-bottom:8px; border-bottom:1px solid #eee;
    }
    #cargoList {
      max-height:58vh; overflow:auto; padding-right:4px;
    }
    .toolbar {
      display:flex; flex-wrap:wrap; gap:6px; margin-top:8px;
    }
    .cargo-card {
      border-bottom:1px solid #e5e5e5; padding:9px 0; cursor:pointer;
      line-height:1.35;
    }
    .cargo-card:hover { background:#f6f6f6; }
    .btn {
      display:inline-block; padding:7px 9px;
      border-radius:8px; background:#e53935; color:white;
      text-decoration:none; font-weight:bold; border:none; cursor:pointer;
      font-size:13px;
    }
    .btn-blue { background:#1976d2; }
    .btn-green { background:#2e7d32; }
    .btn-dark { background:#455a64; }
    .input {
      padding:8px; border-radius:8px; border:1px solid #ccc;
    }
    .create-btn {
      background:#1976d2; color:white; border:none;
      padding:10px 14px; border-radius:8px;
      cursor:pointer; font-weight:bold;
    }
  </style>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
</head>
<body>
<div id="map"></div>

<div id="panel">
  <div id="panelHeader">
    <b>🚛 Dalnoboy карта</b><br>
    <small id="cargoCount">Загрузка грузов...</small><br>
    <small id="truckCount">Загрузка машин...</small><br>
    <small>🟢 GEO до 2ч · 🟡 GEO до 24ч</small><br>
    <small>🟢 ≥100 ₽/км · 🟡 есть ставка · 🔴 без ставки</small>

    <div class="toolbar">
      <button onclick="loadCargo('')" class="btn">📦 Все</button>
      <button onclick="loadCargo('?profitability=profitable')" class="btn btn-green">🟢 Выгодные</button>
      <button onclick="loadCargo('?min_rate=100')" class="btn btn-green">💵 от 100</button>
      <button onclick="loadAvailableTrucks()" class="btn btn-dark">🚚 Догруз</button>
      <button onclick="toggleTrucks()" class="btn btn-dark">🚚 Машины</button>
      <button onclick="toggleAutoRefresh()" id="autoRefreshBtn" class="btn btn-blue">🔄 Авто ON</button>
    </div>

    <div class="toolbar">
      <button onclick="showMyLocation()" class="btn btn-blue">📍 Я здесь</button>
      <select id="radiusSelect" class="input">
        <option value="50">50 км</option>
        <option value="150" selected>150 км</option>
        <option value="500">500 км</option>
      </select>
    </div>

    <div class="toolbar">
      <input id="cityFilter" placeholder="Город" onkeydown="if(event.key==='Enter'){filterCity()}" class="input" style="width:185px;">
      <button onclick="filterCity()" class="btn btn-blue">🔎</button>
      <button onclick="document.getElementById('cityFilter').value=''; loadCargo('')" class="btn">❌</button>
    </div>
  </div>

  <div id="cargoList">Загрузка...</div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
const map = L.map('map').setView([55.7558, 37.6173], 6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 18
}).addTo(map);




let myLocationMarker = null;
let myRadiusCircle = null;

function showMyLocation() {
  if (!navigator.geolocation) {
    alert('Геолокация не поддерживается браузером');
    return;
  }

  navigator.geolocation.getCurrentPosition(
    pos => {
      const lat = pos.coords.latitude;
      const lon = pos.coords.longitude;
      const radiusKm = Number(document.getElementById('radiusSelect').value || 150);

      if (myLocationMarker) map.removeLayer(myLocationMarker);
      if (myRadiusCircle) map.removeLayer(myRadiusCircle);

      myLocationMarker = L.marker([lat, lon])
        .addTo(map)
        .bindPopup('📍 Вы здесь<br>Радиус: ' + radiusKm + ' км')
        .openPopup();

      myRadiusCircle = L.circle([lat, lon], {
        radius: radiusKm * 1000,
        weight: 2,
        fillOpacity: 0.08
      }).addTo(map);

      map.fitBounds(myRadiusCircle.getBounds(), {
        padding: [40, 40]
      });
    },
    err => {
      alert('Не удалось получить геолокацию: ' + err.message);
    },
    {
      enableHighAccuracy: true,
      timeout: 10000,
      maximumAge: 60000
    }
  );
}

let createMode = false;
let pickupPoint = null;
let dropoffPoint = null;
let pickupMarker = null;
let dropoffMarker = null;
let routeLine = null;

const createControl = L.control({ position: 'topleft' });

createControl.onAdd = function() {
  const div = L.DomUtil.create('div');
  div.innerHTML =
    '<button class="create-btn" id="createCargoBtn">➕ Создать груз</button>';

  L.DomEvent.disableClickPropagation(div);
  return div;
};

createControl.addTo(map);

document.getElementById('createCargoBtn').addEventListener('click', function() {

  createMode = true;

  pickupPoint = null;
  dropoffPoint = null;

  if (pickupMarker) map.removeLayer(pickupMarker);
  if (dropoffMarker) map.removeLayer(dropoffMarker);
  if (routeLine) map.removeLayer(routeLine);

  alert('Кликни ТОЧКУ ЗАГРУЗКИ');
});

map.on('click', function(e) {

  if (!createMode) return;

  if (!pickupPoint) {

    pickupPoint = e.latlng;

    pickupMarker = L.marker(e.latlng)
      .addTo(map)
      .bindPopup('📦 Точка загрузки')
      .openPopup();

    alert('Теперь кликни ТОЧКУ ВЫГРУЗКИ');

    return;
  }

  if (!dropoffPoint) {

    dropoffPoint = e.latlng;

    dropoffMarker = L.marker(e.latlng)
      .addTo(map)
      .bindPopup('🏁 Точка выгрузки')
      .openPopup();

    const url =
      'https://router.project-osrm.org/route/v1/driving/' +
      pickupPoint.lng + ',' + pickupPoint.lat + ';' +
      dropoffPoint.lng + ',' + dropoffPoint.lat +
      '?overview=full&geometries=geojson';

    fetch(url)
      .then(r => r.json())
      .then(routeData => {
        const coords = routeData.routes[0].geometry.coordinates.map(p => [p[1], p[0]]);

        routeLine = L.polyline(coords, {
          color: 'blue',
          weight: 5
        }).addTo(map);

        map.fitBounds(routeLine.getBounds(), {
          padding: [50, 50]
        });

      });

    createMode = false;

    console.log('pickup:',
      pickupPoint.lat,
      pickupPoint.lng
    );

    console.log('dropoff:',
      dropoffPoint.lat,
      dropoffPoint.lng
    );

    alert('Маршрут создан');
  }

});
function cargoIconByRate(rate) {
  const r = Number(rate || 0);
  let emoji = '🔴📦';

  if (r >= 100) {
    emoji = '🟢📦';
  } else if (r > 0) {
    emoji = '🟡📦';
  }

  return L.divIcon({
    html: '<div style="font-size:28px">' + emoji + '</div>',
    className: '',
    iconSize: [40, 32],
    iconAnchor: [20, 16]
  });
}

function truckIconByFreshness(updatedAt) {
  const updated = updatedAt ? new Date(updatedAt) : null;
  const hours = updated ? (Date.now() - updated.getTime()) / 1000 / 3600 : 999;

  const emoji = hours <= 2 ? '🟢🚚' : '🟡🚚';

  return L.divIcon({
    html: '<div style="font-size:28px">' + emoji + '</div>',
    className: '',
    iconSize: [40, 32],
    iconAnchor: [20, 16]
  });
}

let cargoMarkers = [];
let cargoLines = [];
let truckMarkers = [];
let trucksVisible = true;
let lastCargoQuery = '';
let autoRefreshEnabled = true;

function clearCargoLines() {
  cargoLines.forEach(l => map.removeLayer(l));
  cargoLines = [];
}

function drawCargoRoute(c) {
  const loadLat = parseFloat(c.load_latitude);
  const loadLon = parseFloat(c.load_longitude);
  const unloadLat = parseFloat(c.unload_latitude);
  const unloadLon = parseFloat(c.unload_longitude);

  if (!loadLat || !loadLon || !unloadLat || !unloadLon) return;

  const line = L.polyline(
    [
      [loadLat, loadLon],
      [unloadLat, unloadLon]
    ],
    {
      weight: 3,
      opacity: 0.65,
      dashArray: '8, 8'
    }
  ).addTo(map);

  line.bindPopup(
    '<b>🛣 Маршрут груза #' + c.id + '</b><br>' +
    '🚩 ' + c.from_city + ' → ' + c.to_city + '<br>' +
    '📏 ' + (c.distance_km || '-') + ' км'
  );

  cargoLines.push(line);
}

function clearCargoMarkers() {
  cargoMarkers.forEach(m => map.removeLayer(m));
  cargoMarkers = [];
  clearCargoLines();
}

function filterCity() {
  const city = document.getElementById('cityFilter').value.trim();
  loadCargo(city ? '?city=' + encodeURIComponent(city) : '');
}

function loadCargo(query) {
  lastCargoQuery = query || '';
  clearCargoMarkers();

  fetch('/api/cargo/open' + query)
    .then(r => r.json())
    .then(data => {
    const points = [];
    const cargoList = document.getElementById('cargoList');
    cargoList.innerHTML = '';
    document.getElementById('cargoCount').innerText = 'Найдено грузов: ' + data.count;

    data.items.forEach(c => {
      const lat = parseFloat(c.load_latitude);
      const lon = parseFloat(c.load_longitude);
      points.push([lat, lon]);

      const marker = L.marker([lat, lon], { icon: cargoIconByRate(c.rate_per_km) })
        .addTo(map)
        .bindPopup(
          '<b>📦 Груз #' + c.id + '</b><br>' +
          '🚩 ' + c.from_city + ' → ' + c.to_city + '<br>' +
          '💰 ' + c.price_amount + ' ' + c.price_currency + '<br>' +
          '📏 ' + (c.distance_km || '-') + ' км<br>' +
          '💵 ' + (c.rate_per_km || '-') + ' ₽/км<br>' +
          '📝 ' + (c.description || '') + '<br>' +
          '<button class="btn" onclick="loadAvailableTrucks(' + c.id + ')">🔎 Попутные машины</button><br>' +
          '<a class="btn" href="https://t.me/dalnoboybros_bot" target="_blank">🚛 Откликнуться</a><br>' +
          '<a class="btn" href="https://www.google.com/maps/dir/?api=1&destination=' + lat + ',' + lon + '" target="_blank">🧭 Маршрут</a>'
        );

      cargoMarkers.push(marker);
      drawCargoRoute(c);

      const card = document.createElement('div');
      card.className = 'cargo-card';
      card.innerHTML =
        '<b>📦 Груз #' + c.id + '</b><br>' +
        '🚩 ' + c.from_city + ' → ' + c.to_city + '<br>' +
        '💰 ' + c.price_amount + ' ' + c.price_currency + '<br>' +
          '📏 ' + (c.distance_km || '-') + ' км<br>' +
          '💵 ' + (c.rate_per_km || '-') + ' ₽/км<br>' +
        '📍 ' + lat.toFixed(4) + ', ' + lon.toFixed(4);

      card.onmouseenter = () => {
        marker.openPopup();
        marker.setZIndexOffset(2000);
      };

      card.onmouseleave = () => {
        marker.closePopup();
        marker.setZIndexOffset(0);
      };

      card.onclick = () => {
        map.flyTo([lat, lon], 10, {
          duration: 0.8
        });

        marker.openPopup();
      };

      cargoList.appendChild(card);
    });

    if (points.length > 0) {
      map.fitBounds(points, { padding: [50, 50], maxZoom: 10 });
    }
  });
}

loadCargo('');

setInterval(() => {
  if (autoRefreshEnabled) {
    loadCargo(lastCargoQuery);
  }
}, 30000);

function loadAvailableTrucks(cargoId) {
  const cargoList = document.getElementById('cargoList');
  cargoList.innerHTML = 'Загрузка попутных машин...';

  const url = cargoId ? '/api/cargo/' + cargoId + '/available-trucks' : '/api/trucks/available';

  fetch(url)
    .then(r => r.json())
    .then(data => {
      document.getElementById('cargoCount').innerText = 'Попутных машин: ' + data.count;
      cargoList.innerHTML = '';

      data.items.forEach(t => {
        const lat = parseFloat(t.latitude);
        const lon = parseFloat(t.longitude);

        const card = document.createElement('div');
        card.className = 'cargo-card';
        card.innerHTML =
          '<b>🚚 Машина #' + t.id + '</b><br>' +
          '👤 ' + (t.full_name || 'Водитель') + '<br>' +
          '🚩 ' + (t.route_from || '-') + ' → ' + (t.route_to || '-') + '<br>' +
          '📦 Свободно: ' + (t.available_tons || '-') + ' т / ' + (t.available_volume_m3 || '-') + ' м³<br>' +
          '🔥 Совпадение: ' + (t.match_score || '-') + '%<br>' +
          '📍 ' + lat.toFixed(4) + ', ' + lon.toFixed(4);

        card.onclick = () => {
          map.setView([lat, lon], 10);
        };

        cargoList.appendChild(card);
      });
    });
}



function toggleAutoRefresh() {
  autoRefreshEnabled = !autoRefreshEnabled;

  const btn = document.getElementById('autoRefreshBtn');

  if (btn) {
    btn.innerText = autoRefreshEnabled
      ? '🔄 Авто ON'
      : '⏸ Авто OFF';
  }
}

function toggleTrucks() {
  trucksVisible = !trucksVisible;

  truckMarkers.forEach(m => {
    if (trucksVisible) {
      m.addTo(map);
    } else {
      map.removeLayer(m);
    }
  });
}

fetch('/api/trucks/active')
  .then(r => r.json())
  .then(data => {
    document.getElementById('truckCount').innerText = 'Активных машин: ' + data.count;

    data.items.forEach(t => {
      const lat = parseFloat(t.latitude);
      const lon = parseFloat(t.longitude);

      let displayLat = lat;
      let displayLon = lon;

      const sameCargoPoint = cargoMarkers.some(m => {
        const p = m.getLatLng();
        return Math.abs(p.lat - lat) < 0.0001 && Math.abs(p.lng - lon) < 0.0001;
      });

      if (sameCargoPoint) {
        displayLon = lon + 0.003;
      }

      const updatedAt = t.location_updated_at || null;
      const updatedText = updatedAt ? new Date(updatedAt).toLocaleString() : '-';

      const contactLine =
        '💬 <a class="btn" href="https://t.me/dalnoboybros_bot?start=user_' + t.driver_id + '" target="_blank">Написать</a><br>';

      const truckMarker = L.marker([displayLat, displayLon], { icon: truckIconByFreshness(updatedAt), zIndexOffset: 1000 })
        .addTo(map)
        .bindPopup(
          '<b>🚚 Машина #' + t.id + '</b><br>' +
          '👤 ' + (t.full_name || 'Водитель') + '<br>' +
          contactLine +
          '🕒 GEO: ' + updatedText + '<br>' +
          '📍 ' + lat + ', ' + lon
        );

      truckMarkers.push(truckMarker);
    });
  });
</script>
</body>
</html>
