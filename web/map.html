<script>
const map = L.map('map').setView([55.7558, 37.6173], 6);

let telegramUserId = null;
let myMinRate = 0;

if (window.Telegram && Telegram.WebApp) {
  Telegram.WebApp.ready();
  Telegram.WebApp.expand();

  const tgUser = Telegram.WebApp.initDataUnsafe?.user;

  if (tgUser && tgUser.id) {
    telegramUserId = tgUser.id;
  }
}


L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 18
}).addTo(map);




let myLocationMarker = null;
let myRadiusCircle = null;

function showMyLocation() {
  if (!navigator.geolocation) {
    alert('Геолокация не поддерживается браузером');
    return;
  }

  navigator.geolocation.getCurrentPosition(
    pos => {
      const lat = pos.coords.latitude;
      const lon = pos.coords.longitude;
      const radiusKm = Number(document.getElementById('radiusSelect').value || 150);

      if (myLocationMarker) map.removeLayer(myLocationMarker);
      if (myRadiusCircle) map.removeLayer(myRadiusCircle);

      myLocationMarker = L.marker([lat, lon])
        .addTo(map)
        .bindPopup('📍 Вы здесь<br>Радиус: ' + radiusKm + ' км')
        .openPopup();

      myRadiusCircle = L.circle([lat, lon], {
        radius: radiusKm * 1000,
        weight: 2,
        fillOpacity: 0.08
      }).addTo(map);

      map.fitBounds(myRadiusCircle.getBounds(), {
        padding: [40, 40]
      });
    },
    err => {
      alert('Не удалось получить геолокацию: ' + err.message);
    },
    {
      enableHighAccuracy: true,
      timeout: 10000,
      maximumAge: 60000
    }
  );
}

let createMode = false;
let pickupPoint = null;
let dropoffPoint = null;
let pickupMarker = null;
let dropoffMarker = null;
let routeLine = null;

const createControl = L.control({ position: 'topleft' });

createControl.onAdd = function() {
  const div = L.DomUtil.create('div');
  div.innerHTML =
    '<button class="create-btn" id="createCargoBtn">➕ Создать груз</button>';

  L.DomEvent.disableClickPropagation(div);
  return div;
};

createControl.addTo(map);

document.getElementById('createCargoBtn').addEventListener('click', function() {
  const panel = document.getElementById('createCargoPanel');

  panel.style.display =
    panel.style.display === 'block'
      ? 'none'
      : 'block';

  createMode = false;
});

  }

    const url =

      });

    console.log('pickup:',

    );

    );

    const distanceKm = routeLine
      ? Math.round((routeLine.getLatLngs().reduce((sum, p, i, arr) => {
          if (i === 0) return 0;
          return sum + arr[i - 1].distanceTo(p);
        }, 0) / 1000) * 10) / 10
      : 0;

    const fromCity = prompt('Город загрузки:', '');
    if (!fromCity) return;

    const toCity = prompt('Город выгрузки:', '');
    if (!toCity) return;

    const priceAmount = prompt('Цена перевозки ₽:', '50000');
    if (!priceAmount) return;

    const description = prompt('Описание груза:', 'Груз с карты') || 'Груз с карты';

    fetch('/api/cargo/create', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        from_city: fromCity,

        unload_latitude: dropoffPoint.lat,

      })
    })
      .then(r => r.json())
      .then(data => {
        if (data.success) {
          alert('✅ Груз создан #' + data.cargo_id + '\nСтавка: ' + formatRate(data.rate_per_km));
          
async function loadMyTruckInfo() {
  const tgId = getTelegramUserId ? getTelegramUserId() : telegramUserId;

  if (!tgId) return;

  try {
    const res = await fetch('/api/me/truck?telegram_id=' + encodeURIComponent(tgId));
    const data = await res.json();

    if (data.success && data.truck) {
      myMinRate = Number(data.truck.min_rate_per_km || 0);
    }
  } catch(e) {
    console.log('my truck info error', e.message);
  }
}


loadMyTruckInfo().then(() => loadCargo(''));

        } else {
          alert('❌ Ошибка создания груза: ' + (data.error || 'unknown'));
        }
      })
      .catch(err => {
        alert('❌ Ошибка сети: ' + err.message);
      });
  }

});


async function geocodeAddress(address) {
  const url =
    'https://nominatim.openstreetmap.org/search?format=json&limit=1&q=' +
    encodeURIComponent(address);

  const res = await fetch(url, {
    headers: {
      'Accept': 'application/json'
    }
  });

  const data = await res.json();

  if (!data.length) {
    alert('Адрес не найден');
    return null;
  }

  return {
    lat: Number(data[0].lat),
    lon: Number(data[0].lon),
    name: data[0].display_name
  };
}

async function findPickupAddress() {
  const address = document.getElementById('pickupAddress').value.trim();

  if (!address) {
    alert('Введите адрес загрузки');
    return;
  }

  const point = await geocodeAddress(address);
  if (!point) return;

  pickupPoint = L.latLng(point.lat, point.lon);

  if (pickupMarker) map.removeLayer(pickupMarker);

  pickupMarker = L.marker(pickupPoint)
    .addTo(map)
    .bindPopup('📦 Загрузка<br>' + point.name)
    .openPopup();

  map.setView(pickupPoint, 13);
}

async function findDropoffAddress() {
  const address = document.getElementById('dropoffAddress').value.trim();

  if (!address) {
    alert('Введите адрес выгрузки');
    return;
  }

  const point = await geocodeAddress(address);
  if (!point) return;

  dropoffPoint = L.latLng(point.lat, point.lon);

  if (dropoffMarker) map.removeLayer(dropoffMarker);

  dropoffMarker = L.marker(dropoffPoint)
    .addTo(map)
    .bindPopup('🏁 Выгрузка<br>' + point.name)
    .openPopup();

  if (pickupPoint) {
    drawSelectedRoute();
  }

  map.setView(dropoffPoint, 13);
}

function drawSelectedRoute() {
  if (!pickupPoint || !dropoffPoint) return;

  if (routeLine) map.removeLayer(routeLine);

  const url =
    'https://router.project-osrm.org/route/v1/driving/' +
    pickupPoint.lng + ',' + pickupPoint.lat + ';' +
    dropoffPoint.lng + ',' + dropoffPoint.lat +
    '?overview=full&geometries=geojson';

  fetch(url)
    .then(r => r.json())
    .then(routeData => {
      if (!routeData.routes || !routeData.routes.length) {
        alert('Маршрут не найден');
        return;
      }

      const coords = routeData.routes[0].geometry.coordinates.map(p => [p[1], p[0]]);

      routeLine = L.polyline(coords, {
        color: 'blue',
        weight: 5
      }).addTo(map);

      map.fitBounds(routeLine.getBounds(), {
        padding: [50, 50]
      });
    });
}



async function submitCreatedCargo() {

  if (!pickupPoint || !dropoffPoint) {
    alert('Сначала найдите адрес загрузки и выгрузки');
    return;
  }

  const fromCity =
    document.getElementById('pickupAddress').value.trim();

  const toCity =
    document.getElementById('dropoffAddress').value.trim();

  const price =
    Number(document.getElementById('cargoPrice').value || 0);

  const description =
    document.getElementById('cargoDescription').value.trim() || 'Груз с карты';

  if (!fromCity || !toCity || !price) {
    alert('Заполните адреса и цену');
    return;
  }

  let distanceKm = 0;

  if (routeLine) {
    const points = routeLine.getLatLngs();

    let meters = 0;

    for (let i = 1; i < points.length; i++) {
      meters += points[i - 1].distanceTo(points[i]);
    }

    distanceKm = Math.round((meters / 1000) * 10) / 10;
  }

  fetch('/api/cargo/create', {
    method:'POST',
    headers:{
      'Content-Type':'application/json'
    },
    body:JSON.stringify({
      from_city: fromCity,
      to_city: toCity,
      description: description,
      price_amount: price,
      load_latitude: pickupPoint.lat,
      load_longitude: pickupPoint.lng,
      unload_latitude: dropoffPoint.lat,
      unload_longitude: dropoffPoint.lng,
      distance_km: distanceKm
    })
  })
  .then(r=>r.json())
  .then(data=>{

    if (data.success) {

      alert(
        '✅ Груз создан #' + data.cargo_id +
        '\nРасстояние: ' + distanceKm + ' км' +
        '\nСтавка: ' + formatRate(data.rate_per_km)
      );

      document.getElementById('createCargoPanel').style.display='none';

      

    } else {

      alert('Ошибка создания груза: ' + (data.error || 'unknown'));

    }

  })
  .catch(err => {
    alert('Ошибка сети: ' + err.message);
  });

}


function cargoIconByRate(rate) {
  const r = Number(rate || 0);
  const min = Number(myMinRate || 0);

  let emoji = '🔴📦';

  if (r > 0 && min > 0 && r >= min) {
    emoji = '🟢📦';
  } else if (r > 0) {
    emoji = '🟡📦';
  }

  return L.divIcon({
    html: '<div style="font-size:28px">' + emoji + '</div>',
    className: '',
    iconSize: [40, 32],
    iconAnchor: [20, 16]
  });
}

function truckIconByFreshness(updatedAt) {
  const updated = updatedAt ? new Date(updatedAt) : null;
  const hours = updated ? (Date.now() - updated.getTime()) / 1000 / 3600 : 999;

  const emoji = hours <= 2 ? '🟢🚚' : '🟡🚚';

  return L.divIcon({
    html: '<div style="font-size:28px">' + emoji + '</div>',
    className: '',
    iconSize: [40, 32],
    iconAnchor: [20, 16]
  });
}

let cargoMarkers = [];
let cargoLines = [];
let truckMarkers = [];
let truckMarkersById = {};
let trucksVisible = true;

const cargoCluster = L.markerClusterGroup({
  spiderfyOnMaxZoom: true,
  showCoverageOnHover: false,
  maxClusterRadius: 45
});

map.addLayer(cargoCluster);
let lastCargoQuery = '';
let autoRefreshEnabled = false;

function formatRate(rate) {
  if (rate === null || rate === undefined || rate === '') {
    return 'нет ставки';
  }

  const n = Number(rate);

  if (isNaN(n)) {
    return 'нет ставки';
  }

  return n.toFixed(2) + ' ₽/км';
}


function clearCargoLines() {
  cargoLines.forEach(l => map.removeLayer(l));
  cargoLines = [];
}

function drawCargoRoute(c) {
  const loadLat = parseFloat(c.load_latitude);
  const loadLon = parseFloat(c.load_longitude);
  const unloadLat = parseFloat(c.unload_latitude);
  const unloadLon = parseFloat(c.unload_longitude);

  if (!loadLat || !loadLon || !unloadLat || !unloadLon) return;

  const line = L.polyline(
    [
      [loadLat, loadLon],
      [unloadLat, unloadLon]
    ],
    {
      weight: 3,
      opacity: 0.65,
      dashArray: '8, 8'
    }
  ).addTo(map);

  line.bindPopup(
    '<b>🛣 Маршрут груза #' + c.id + '</b><br>' +
    '🚩 ' + c.from_city + ' → ' + c.to_city + '<br>' +
    '📏 ' + (c.distance_km || '-') + ' км'
  );

  cargoLines.push(line);
}

function clearCargoMarkers() {
  cargoCluster.clearLayers();
  cargoMarkers.forEach(m => map.removeLayer(m));
  cargoMarkers = [];
  clearCargoLines();
}

function filterCity() {
  const city = document.getElementById('cityFilter').value.trim();
  loadCargo(city ? '?city=' + encodeURIComponent(city) : '');
}



function toggleStats() {
  const el = document.getElementById('statsBlock');

  if (!el) return;

  if (el.style.display === 'none') {
    el.style.display = 'block';
  } else {
    el.style.display = 'none';
  }
}


function loadCargo(query) {
  lastCargoQuery = query || '';
  clearCargoMarkers();

  fetch('/api/cargo/open' + query)
    .then(r => r.json())
    .then(data => {
    const points = [];
    const cargoList = document.getElementById('cargoList');
    cargoList.innerHTML = '';
    document.getElementById('cargoCount').innerText = 'Найдено грузов: ' + data.count;

    data.items.forEach(c => {
      const lat = parseFloat(c.load_latitude);
      const lon = parseFloat(c.load_longitude);
      points.push([lat, lon]);

      const marker = L.marker([lat, lon], { icon: cargoIconByRate(c.rate_per_km) })
        .bindPopup(
          '<b>📦 Груз #' + c.id + '</b><br>' +
          '🚩 ' + c.from_city + ' → ' + c.to_city + '<br>' +
          '💰 ' + c.price_amount + ' ' + c.price_currency + '<br>' +
          '📏 ' + (c.distance_km || '-') + ' км<br>' +
          '💵 ' + formatRate(c.rate_per_km) + '<br>' +
          '📝 ' + (c.description || '') + '<br>' +
          '<button class="btn" onclick="loadAvailableTrucks(' + c.id + ')">🔎 Попутные машины</button><br>' +
          '<button class="btn" onclick="respondToCargo(' + c.id + ')">🚛 Откликнуться</button><br>' +
          '<a class="btn" href="https://www.google.com/maps/dir/?api=1&destination=' + lat + ',' + lon + '" target="_blank">🧭 Маршрут</a>'
        );

      cargoMarkers.push(marker);
      cargoCluster.addLayer(marker);
      drawCargoRoute(c);

      const card = document.createElement('div');
      card.className = 'cargo-card';
      card.innerHTML =
        '<b>📦 Груз #' + c.id + '</b><br>' +
        '🚩 ' + c.from_city + ' → ' + c.to_city + '<br>' +
        '💰 ' + c.price_amount + ' ' + c.price_currency + '<br>' +
          '📏 ' + (c.distance_km || '-') + ' км<br>' +
          '💵 ' + formatRate(c.rate_per_km) + '<br>' +
        '📍 ' + lat.toFixed(4) + ', ' + lon.toFixed(4) + '<br>' +
        '<button class="btn btn-green" onclick="event.stopPropagation(); respondToCargo(' + c.id + ')">🚛 Откликнуться</button>';

      card.onmouseenter = () => {
        marker.openPopup();
        marker.setZIndexOffset(2000);
      };

      card.onmouseleave = () => {
        marker.closePopup();
        marker.setZIndexOffset(0);
      };

      card.onclick = () => {
        map.flyTo([lat, lon], 10, {
          duration: 0.8
        });

        marker.openPopup();
      };

      cargoList.appendChild(card);
    });

    if (points.length > 0) {
      map.fitBounds(points, { padding: [50, 50], maxZoom: 10 });
    }
  });
}

loadCargo('');

setInterval(() => {
  if (autoRefreshEnabled) {
    loadCargo(lastCargoQuery);
  }
}, 60 * 1000);

function loadAvailableTrucks(cargoId) {

  const url = cargoId ? '/api/cargo/' + cargoId + '/available-trucks' : '/api/trucks/available';

  fetch(url)
    .then(r => r.json())
    .then(data => {
      const items = data.items || [];
      document.getElementById('cargoCount').innerText = 'Попутных машин: ' + items.length;
      cargoList.innerHTML = '';

      if (!items.length) {
        cargoList.innerHTML = '<div class="cargo-card">🚚 Попутных машин пока нет</div>';
        return;
      }

      items.forEach(t => {
        const lat = parseFloat(t.latitude);
        const lon = parseFloat(t.longitude);

        const card = document.createElement('div');
        card.className = 'cargo-card';
        card.innerHTML =
          '<b>🚚 Машина #' + t.id + '</b><br>' +
          '👤 ' + (t.full_name || 'Водитель') + '<br>' +
          '📍 До загрузки: ' + (t.distance_km || '-') + ' км<br>' +
          '📦 ' + (t.body_type || '-') + ' · ' + (t.capacity_tons || '-') + ' т / ' + (t.volume_m3 || '-') + ' м³<br>' +
          '💰 Мин. ставка: ' + (t.min_rate_per_km || '-') + ' ₽/км<br>' +
          '🔥 Совпадение: ' + (t.match_score || '-') + '%<br>' +
          '🟢 GEO: ' + (t.location_updated_at ? 'активно' : 'нет');

        card.onclick = () => {
          map.setView([lat, lon], 10);
        };

        cargoList.appendChild(card);
      });
    });
}





function loadPersonalNearby() {
  let tgId = telegramUserId;

  const input = document.getElementById('telegramIdInput');

  if (!tgId && input) {
    tgId = input.value.trim();
  }

  if (!tgId) {
    alert('Не удалось определить Telegram ID. Откройте карту из Telegram Mini App.');
    return;
  }

  clearCargoMarkers();

  fetch('/api/nearby?telegram_id=' + encodeURIComponent(tgId) + '&radius=500&profitability=profitable')
    .then(r => r.json())
    .then(data => {

      if (!data.items) return;

      document.getElementById('cargoCount').innerText =
        'Выгодных для вас: ' + data.items.length;

      data.items.forEach(c => {
        const lat = parseFloat(c.load_latitude);
        const lon = parseFloat(c.load_longitude);

        if (!lat || !lon) return;

        const marker = L.marker(
          [lat, lon],
          { icon: cargoIconByRate(c.rate_per_km) }
        ).bindPopup(
          '<b>🟢 Выгодный груз #' + c.id + '</b><br>' +
          '🚩 ' + c.from_city + ' → ' + c.to_city + '<br>' +
          '💰 ' + c.price_amount + ' RUB<br>' +
          '💵 ' + (
  c.rate_per_km
    ? Number(c.rate_per_km).toFixed(2) + ' ₽/км'
    : 'нет ставки'
)
        );

        cargoMarkers.push(marker);
        cargoCluster.addLayer(marker);
      });
    });
}



function getTelegramUserId() {
  if (telegramUserId) return telegramUserId;

  if (window.Telegram && Telegram.WebApp) {
    const tgUser = Telegram.WebApp.initDataUnsafe?.user;
    if (tgUser && tgUser.id) return tgUser.id;
  }

  return null;
}

async function respondToCargo(cargoId) {
  const tgId = getTelegramUserId();

  if (!tgId) {
    alert('Не удалось определить Telegram ID. Откройте карту через Telegram.');
    return;
  }

  try {
    const res = await fetch('/api/respond', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        telegram_id: tgId,
        cargo_id: cargoId
      })
    });

    const data = await res.json();

    if (data.success && data.already) {
      alert('⚠️ Вы уже откликались на этот груз');
      return;
    }

    if (data.success) {
      alert('✅ Отклик отправлен');
      return;
    }

    if (data.error === 'truck_not_found') {
      alert('❌ Сначала добавьте машину в боте');
      return;
    }

    if (data.error === 'user_not_found') {
      alert('❌ Пользователь не найден. Нажмите /start в боте.');
      return;
    }

    alert('❌ Ошибка отклика: ' + (data.error || 'unknown'));

  } catch (e) {
    alert('❌ Ошибка сети: ' + e.message);
  }
}



function autoUpdateTruckGeo() {
  const tgId = getTelegramUserId ? getTelegramUserId() : telegramUserId;

  if (!tgId || !navigator.geolocation) {
    return;
  }

  navigator.geolocation.getCurrentPosition(
    pos => {
      const lat = pos.coords.latitude;
      const lon = pos.coords.longitude;

      fetch('/api/truck/location', {
        method:'POST',
        headers:{ 'Content-Type':'application/json' },
        body:JSON.stringify({
          telegram_id: tgId,
          lat: lat,
          lon: lon
        })
      })
      .then(r=>r.json())
      .then(data=>{
        if (data.success) {
          console.log('truck geo updated');
        }
      });
    },
    err => {
      console.log('geo denied', err.message);
    },
    {
      enableHighAccuracy:true,
      timeout:10000,
      maximumAge:60000
    }
  );
}

setTimeout(autoUpdateTruckGeo, 1200);
setInterval(autoUpdateTruckGeo, 30 * 60 * 1000);


function toggleAutoRefresh() {
  autoRefreshEnabled = !autoRefreshEnabled;

  const btn = document.getElementById('autoRefreshBtn');

  if (btn) {
    btn.innerText = autoRefreshEnabled
      ? '⏸ Авто OFF'
      : '⏸ Авто OFF';
  }
}

function toggleTrucks() {
  trucksVisible = !trucksVisible;

  truckMarkers.forEach(m => {
    if (trucksVisible) {
      m.addTo(map);
    } else {
      map.removeLayer(m);
    }
  });
}

function clearTruckMarkers() {
  truckMarkers.forEach(m => {
    try {
      map.removeLayer(m);
    } catch(e) {}
  });
  truckMarkers = [];
  truckMarkersById = {};
}

function loadActiveTrucks() {
  clearTruckMarkers();

  fetch('/api/trucks/active')
    .then(r => r.json())
    .then(data => {
      const items = data.items || [];

      document.getElementById('truckCount').innerText = 'Активных машин: ' + items.length;

      items.forEach(t => {
        const lat = parseFloat(t.latitude);
        const lon = parseFloat(t.longitude);

        if (!lat || !lon) return;

        let displayLat = lat;
        let displayLon = lon;

        const sameCargoPoint = cargoMarkers.some(m => {
          const p = m.getLatLng();
          return Math.abs(p.lat - lat) < 0.0001 && Math.abs(p.lng - lon) < 0.0001;
        });

        if (sameCargoPoint) {
          displayLon = lon + 0.003;
        }

        const updatedAt = t.location_updated_at || null;
        const updatedText = updatedAt ? new Date(updatedAt).toLocaleString() : '-';

        const contactLine =
          '💬 <a class="btn" href="https://t.me/dalnoboybros_bot?start=user_' + t.driver_id + '" target="_blank">Профиль</a><br>';

        const truckMarker = L.marker([displayLat, displayLon], {
          icon: truckIconByFreshness(updatedAt),
          zIndexOffset: 1000
        })
          .addTo(map)
          .bindPopup(
            '<b>🚚 Машина #' + t.id + '</b><br>' +
            '👤 ' + (t.full_name || 'Водитель') + '<br>' +
            contactLine +
            '🕒 GEO: ' + updatedText + '<br>' +
            '📍 ' + lat.toFixed(4) + ', ' + lon.toFixed(4)
          );

        truckMarkers.push(truckMarker);
        truckMarkersById[t.id] = truckMarker;
      });
    })
    .catch(e => console.log('load trucks error', e.message));
}


function updateTruckMarkerLive(t) {
  const id = t.truck_id || t.id;
  const lat = parseFloat(t.latitude);
  const lon = parseFloat(t.longitude);

  if (!id || !lat || !lon) return;

  const updatedAt = t.updated_at || t.location_updated_at || new Date().toISOString();
  const updatedText = new Date(updatedAt).toLocaleString();

  let marker = truckMarkersById[id];

  if (marker) {
    marker.setLatLng([lat, lon]);
    marker.setIcon(truckIconByFreshness(updatedAt));
    marker.setPopupContent(
      '<b>🚚 Машина #' + id + '</b><br>' +
      '🕒 GEO: ' + updatedText + '<br>' +
      '📍 ' + lat.toFixed(4) + ', ' + lon.toFixed(4)
    );
  } else {
    marker = L.marker([lat, lon], {
      icon: truckIconByFreshness(updatedAt),
      zIndexOffset: 1000
    }).bindPopup(
      '<b>🚚 Машина #' + id + '</b><br>' +
      '🕒 GEO: ' + updatedText + '<br>' +
      '📍 ' + lat.toFixed(4) + ', ' + lon.toFixed(4)
    );

    truckMarkersById[id] = marker;
    truckMarkers.push(marker);

    if (trucksVisible) {
      marker.addTo(map);
    }
  }
}
