<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Дальнобой — кабинет</title>
<style>
body{margin:0;font-family:Arial;background:#0f172a;color:#e5e7eb;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{max-width:420px;width:100%;background:#111827;border:1px solid #334155;border-radius:18px;padding:22px}
input,button{width:100%;padding:14px;border-radius:12px;margin-top:12px;font-size:18px}
input{background:#020617;color:white;border:1px solid #475569;letter-spacing:2px}
button{background:#22c55e;color:#052e16;border:0;font-weight:700}
.status,.profile{margin-top:14px;background:#020617;border:1px solid #334155;border-radius:12px;padding:12px;white-space:pre-wrap}
.profile{display:none}
.row{display:flex;justify-content:space-between;border-bottom:1px solid #1e293b;padding:7px 0}

.actions{display:none;margin-top:14px}
.actionBtn{display:block;text-align:center;text-decoration:none;background:#334155;color:#e5e7eb;padding:12px;border-radius:12px;margin-top:10px;font-weight:700}
.actionBtn.green{background:#22c55e;color:#052e16}
.actionBtn.blue{background:#38bdf8;color:#082f49}

.cargoBox{display:none;margin-top:14px}
.cargoItem{background:#0f172a;border:1px solid #334155;border-radius:14px;padding:12px;margin-top:10px}
.cargoTitle{font-weight:800;margin-bottom:6px}
.cargoMeta{color:#94a3b8;font-size:13px;line-height:1.45}
.hint{color:#94a3b8;font-size:13px;margin-top:8px;text-align:center}
.detailBox{display:none;margin-top:14px;background:#020617;border:1px solid #38bdf8;border-radius:14px;padding:12px}
.badge{display:inline-block;padding:3px 8px;border-radius:999px;background:#334155;color:#e5e7eb;font-size:12px;margin-top:6px}
.moreBtn{margin-top:8px;padding:8px;border-radius:10px;background:#38bdf8;color:#082f49;border:0;font-weight:800;cursor:pointer;font-size:13px}
.cargoDetails{margin-top:8px;background:#020617;border:1px solid #38bdf8;border-radius:12px;padding:10px}
.cargoDetails summary{cursor:pointer;font-weight:800;color:#38bdf8}
.cargoDetailsBody{margin-top:10px;color:#cbd5e1;font-size:13px;line-height:1.5}
.cargoDetails a.moreBtn{display:block;text-align:center;text-decoration:none;margin-top:8px}
.actionBtn{width:100%;border:0;font-size:15px;cursor:pointer}
.filterBar{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.filterBtn{padding:9px;border-radius:10px;background:#334155;color:#e5e7eb;border:0;font-size:13px;cursor:pointer}
.filterBtn.active{background:#38bdf8;color:#082f49;font-weight:800}
</style>
</head>
<body>
<div class="card">
<h2>🚛 Дальнобой</h2>
<p>Напишите в Telegram-боте <b>/login</b>, получите код и введите его здесь.</p>

<div id="loginBox">
<input id="code" placeholder="12345678" inputmode="numeric">
<button onclick="login()">Войти</button>
</div>

<div id="profile" class="profile">
<div class="row"><span>Имя</span><span id="fullName">—</span></div>
<div class="row"><span>Роль</span><span id="role">—</span></div>
<div class="row"><span>Тариф</span><span id="plan">—</span></div>
<div class="row"><span>Telegram</span><span id="telegramId">—</span></div>
<button onclick="logout()">Выйти</button>
</div>

<div id="actions" class="actions"></div>
<div id="cargoDetail" class="detailBox"></div>
<div id="cargoList" class="cargoBox"></div>
<div id="dealsList" class="cargoList"></div>
<div id="cargoHint" class="hint">Нажмите на груз, чтобы открыть подробности</div>

<div id="status" class="status">Готово к входу.</div>
</div>

<script>
const statusBox=document.getElementById("status");
function status(t){statusBox.textContent=t}

document.getElementById("cargoList").addEventListener("click", function(e){
 const item=e.target.closest("[data-cargo-id]");
 if(item){
   showCargoDetail(item.dataset.cargoId);
 }
});

function renderActions(role){
 const box=document.getElementById("actions");
 let html="";
 if(role==="shipper"){
   html += '<a class="actionBtn green" href="/map.html">🗺 Карта грузов</a>';
   html += '<button class="actionBtn blue" onclick="loadMyCargo()">📦 Мои грузы</button>';
   html += '<a class="actionBtn" href="https://t.me/dalnoboybros_bot">➕ Создать груз в боте</a>';
   html += '<a class="actionBtn" href="https://t.me/dalnoboybros_bot">💬 Открыть бота</a>';
 } else if(role==="carrier"){
   html += '<a class="actionBtn green" href="/map.html">🗺 Карта грузов</a>';
   html += '<a class="actionBtn" href="https://t.me/dalnoboybros_bot">🚚 Моя машина</a>';
   html += '<a class="actionBtn" href="https://t.me/dalnoboybros_bot">📦 Найти грузы</a>';
 } else if(role==="dispatcher"){
   html += '<a class="actionBtn blue" href="/dispatcher/">👥 Кабинет диспетчера</a>';
   html += '<a class="actionBtn green" href="/map.html">🗺 Карта</a>';
 } else if(role==="admin"){
   html += '<a class="actionBtn blue" href="/dispatcher/">👥 Диспетчерская</a>';
   html += '<a class="actionBtn green" href="/map.html">🗺 Карта</a>';
   html += '<a class="actionBtn" href="https://t.me/dalnoboybros_bot">🛡 Админ в боте</a>';
 } else {
   html += '<a class="actionBtn green" href="/map.html">🗺 Карта</a>';
   html += '<a class="actionBtn" href="https://t.me/dalnoboybros_bot">Открыть бота</a>';
 }
 html += '<button id="responsesBtn" class="actionBtn blue" onclick="loadAppResponses()">📨 Отклики</button>';
 html += '<button class="actionBtn blue" onclick="loadMyDeals()">🤝 Сделки</button>';
 box.innerHTML=html;
 box.style.display="block";
 updateResponsesBadge();
}



async function updateResponsesBadge(){
 const btn=document.getElementById("responsesBtn");
 if(!btn){return;}

 btn.textContent="📨 Отклики";

 const token=localStorage.getItem("dalnoboy_token");
 if(!token){return;}

 try{
   const r=await fetch("/api/app/responses",{
     headers:{Authorization:"Bearer "+token}
   });

   const d=await r.json();
   if(!d.success){return;}

   const owner=d.owner || [];
   const cnt=owner.filter(x=>{
     const st=String(x.status || "");
     return ["pending","offered"].includes(st) && !x.deal_id;
   }).length;

   btn.textContent=cnt>0 ? `📨 Отклики (${cnt})` : "📨 Отклики";
 }catch(e){
   console.log("responses badge error", e);
 }
}


function esc(v){
 return String(v ?? "").replace(/[&<>"']/g, c => ({
   "&":"&amp;",
   "<":"&lt;",
   ">":"&gt;",
   '"':"&quot;",
   "'":"&#039;"
 }[c]));
}

function humanStatus(v){
 const m={
   open:"открыт",
   booked:"забронирован",
   in_progress:"в работе",
   done:"завершён",
   cancelled:"отменён"
 };
 return m[v] || v || "—";
}


let appCargo=[];
let cargoFilter="all";

function isCargoVisible(c){
 const st=c.status || "";
 if(cargoFilter==="all") return true;
 if(cargoFilter==="open") return st==="open";
 if(cargoFilter==="work") return ["booked","active","driver_assigned","to_pickup","loading","loaded","in_progress","breakdown","resume_movement"].includes(st);
 if(cargoFilter==="done") return ["done","delivered","closed"].includes(st);
 if(cargoFilter==="cancelled") return st==="cancelled";
 return true;
}

function setCargoFilter(f){
 cargoFilter=f;
 renderCargoList();
}

function renderCargoList(){
 const box=document.getElementById("cargoList");

 const filters=`
   <div class="filterBar">
     <button class="filterBtn ${cargoFilter==="all" ? "active" : ""}" onclick="setCargoFilter('all')">Все</button>
     <button class="filterBtn ${cargoFilter==="open" ? "active" : ""}" onclick="setCargoFilter('open')">Открытые</button>
     <button class="filterBtn ${cargoFilter==="work" ? "active" : ""}" onclick="setCargoFilter('work')">В работе</button>
     <button class="filterBtn ${cargoFilter==="done" ? "active" : ""}" onclick="setCargoFilter('done')">Завершённые</button>
     <button class="filterBtn ${cargoFilter==="cancelled" ? "active" : ""}" onclick="setCargoFilter('cancelled')">Отменённые</button>
   </div>
 `;

 const list=appCargo.filter(isCargoVisible);

 if(!list.length){
   box.innerHTML=filters+'<div class="cargoItem">По этому фильтру грузов нет</div>';
   return;
 }

 box.innerHTML=filters+list.map(c=>`
   <div class="cargoItem">
     <div class="cargoTitle">#${esc(c.id)} ${esc(c.from_city)} → ${esc(c.to_city)}</div>
     <div class="cargoMeta">
       ${esc(c.description || "Без описания")}<br>
       💰 ${esc(c.price_amount)} ${esc(c.price_currency || "RUB")}
       ${c.distance_km ? " · 🛣 "+esc(c.distance_km)+" км" : ""}
       ${c.rate_per_km ? " · "+esc(c.rate_per_km)+" ₽/км" : ""}
     </div>
     <span class="badge">${esc(humanStatus(c.status))}</span>
      <details class="cargoDetails">
        <summary>Подробнее</summary>
        <div class="cargoDetailsBody">
          <b>Маршрут:</b><br>${esc(c.from_city)} → ${esc(c.to_city)}<br><br>
          <b>Описание:</b><br>${esc(c.description || "Без описания")}<br><br>
          <b>Цена:</b> ${esc(c.price_amount)} ${esc(c.price_currency || "RUB")}<br>
          <b>Расстояние:</b> ${esc(c.distance_km || "—")} км<br>
          <b>Ставка:</b> ${esc(c.rate_per_km || "—")} ₽/км<br>
          <b>Статус:</b> ${esc(humanStatus(c.status))}
        </div>
      </details>
   </div>
 `).join("");
}

async function loadMyCargo(){
 const box=document.getElementById("cargoList");
 const token=localStorage.getItem("dalnoboy_token");

 if(!token){
   status("❌ Нужно войти заново");
   return;
 }

 box.style.display="block";
 box.innerHTML='<div class="cargoItem">Загружаю грузы...</div>';

 const r=await fetch("/api/app/my-cargo",{
   headers:{Authorization:"Bearer "+token}
 });

 const d=await r.json();

 if(!d.success){
   box.innerHTML='<div class="cargoItem">❌ Не удалось загрузить грузы</div>';
   status("❌ Ошибка загрузки грузов");
   return;
 }

 appCargo=d.cargo || [];
 cargoFilter="all";

 if(!appCargo.length){
   box.innerHTML='<div class="cargoItem">Грузов пока нет</div>';
   return;
 }

 renderCargoList();
}




function dealSideName(side){
 if(side==="shipper") return "Заказчик";
 if(side==="carrier") return "Перевозчик";
 return side || "—";
}

function dealStatusName(st){
 if(st==="active") return "Активная";
 if(st==="driver_assigned") return "Водитель назначен";
 if(st==="to_pickup") return "Едет на погрузку";
 if(st==="loading") return "Погрузка";
 if(st==="loaded") return "Загружен";
 if(st==="in_progress") return "В пути";
 if(st==="breakdown") return "Поломка";
 if(st==="resume_movement") return "Продолжил движение";
 if(st==="delivered") return "Доставлено";
 if(st==="done") return "Выполнено";
 if(st==="closed") return "Закрыта";
 if(st==="cancelled") return "Отменена";
 return st || "—";
}


function dealSafeName(st){
 if(st==="draft") return "Черновик";
 if(st==="pending") return "Ожидает";
 if(st==="confirmed") return "Подтверждена";
 if(st==="closed") return "Закрыта";
 if(st==="cancelled") return "Отменена";
 return st || "—";
}

function dealPaymentName(st){
 if(st==="pending") return "Ожидает оплаты";
 if(st==="paid") return "Оплачено";
 if(st==="partial") return "Частично оплачено";
 if(st==="refunded") return "Возврат";
 if(st==="cancelled") return "Отменено";
 return st || "—";
}



function responseStatusName(st){
 if(st==="pending") return "Ожидает решения";
 if(st==="accepted") return "Принят";
 if(st==="rejected") return "Отклонён";
 if(st==="offered") return "Предложен";
 return st || "—";
}


async function responseActionWeb(id, action){
 const token=localStorage.getItem("dalnoboy_token");

 if(!token){
   status("❌ Нужно войти заново");
   return;
 }

 const word = action==="accept" ? "принять" : "отклонить";
 if(!confirm("Точно "+word+" отклик #"+id+"?")) return;

 const r=await fetch("/api/app/response-action",{
   method:"POST",
   headers:{
     "Content-Type":"application/json",
     Authorization:"Bearer "+token
   },
   body:JSON.stringify({response_id:id,action:action})
 });

 const d=await r.json();

 if(!d.success){
   status("❌ Ошибка: "+(d.error||"server error"));
   return;
 }

 if(action==="accept"){
   status("✅ Отклик принят, сделка создана");
 } else {
   status("❌ Отклик отклонён");
 }

 await loadAppResponses();
 await updateResponsesBadge();
}

async function loadAppResponses(){
 const box=document.getElementById("dealsList");
 if(!box){status("❌ Блок откликов не найден");return;}

 const cargoBox=document.getElementById("cargoList");
 const cargoDetail=document.getElementById("cargoDetail");
 const token=localStorage.getItem("dalnoboy_token");

 if(!token){
   status("❌ Нужно войти заново");
   return;
 }

 if(cargoBox){cargoBox.style.display="none";}
 if(cargoDetail){cargoDetail.style.display="none";cargoDetail.innerHTML="";}

 box.style.display="block";
 box.innerHTML='<div class="cargoItem">Загружаю отклики...</div>';

 const r=await fetch("/api/app/responses",{
   headers:{Authorization:"Bearer "+token}
 });

 const d=await r.json();

 if(!d.success){
   box.innerHTML='<div class="cargoItem">❌ Не удалось загрузить отклики</div>';
   status("❌ Ошибка загрузки откликов");
   return;
 }

 const owner=d.owner || [];
 const driver=d.driver || [];

 const pendingFirst = (arr)=>arr.slice().sort((a,b)=>{
   const ap = ["pending","offered"].includes(String(a.status || "")) && !a.deal_id ? 0 : 1;
   const bp = ["pending","offered"].includes(String(b.status || "")) && !b.deal_id ? 0 : 1;
   return ap - bp;
 });

 const ownerSorted = pendingFirst(owner);

 let html='<div class="cargoItem"><b>📨 Отклики</b></div>';

 html += '<div class="cargoItem"><b>Отклики на мои грузы</b></div>';

 if(owner.length){
   html += ownerSorted.map(x=>{
     const canAct = ["pending","offered"].includes(String(x.status || "")) && !x.deal_id;
     const waitStyle = canAct ? ' style="border:2px solid #22c55e;background:#f0fdf4;"' : "";
     const waitBadge = canAct ? '<div style="font-weight:800;color:#166534;margin-bottom:6px;">⏳ ОЖИДАЕТ РЕШЕНИЯ</div>' : "";
     return `
       <div class="cargoItem"${waitStyle}>
         ${waitBadge}
         <b>Отклик #${esc(x.id)}</b><br>
         <b>Груз:</b> #${esc(x.cargo_id)} ${esc(x.from_city)} → ${esc(x.to_city)}<br>
         <b>Водитель:</b> ${esc(x.driver_name || "—")} ${x.driver_verified ? "✅" : "⚠️"}<br>
         <b>Машина:</b> #${esc(x.truck_id || "—")} ${esc(x.current_city || "")} ${esc(x.body_type || "")}<br>
         <b>Цена:</b> ${esc(x.price_amount || "—")} ${esc(x.price_currency || "RUB")}<br>
         <b>Ставка:</b> ${esc(x.rate_per_km || "—")} ₽/км<br>
         <b>Статус:</b> ${esc(responseStatusName(x.status))}<br>
         ${x.deal_id ? `<b>Сделка:</b> #${esc(x.deal_id)}<br><button class="moreBtn" onclick="loadMyDeals(\'${esc(x.deal_id)}\')">🤝 Открыть сделку</button>` : ""}
         ${canAct ? `<br><button class="moreBtn" onclick="responseActionWeb('${esc(x.id)}','accept')">✅ Принять</button>
         <button class="moreBtn" onclick="responseActionWeb('${esc(x.id)}','reject')">❌ Отклонить</button>` : ""}
       </div>`;
   }).join("");
 } else {
   html += '<div class="cargoItem">Пока нет откликов на ваши грузы</div>';
 }

 html += '<div class="cargoItem"><b>Мои отклики как перевозчика</b></div>';

 if(driver.length){
   html += driver.map(x=>`
     <div class="cargoItem">
       <b>Мой отклик #${esc(x.id)}</b><br>
       <b>Груз:</b> #${esc(x.cargo_id)} ${esc(x.from_city)} → ${esc(x.to_city)}<br>
       <b>Заказчик:</b> ${esc(x.owner_name || "—")}<br>
       <b>Цена:</b> ${esc(x.price_amount || "—")} ${esc(x.price_currency || "RUB")}<br>
       <b>Ставка:</b> ${esc(x.rate_per_km || "—")} ₽/км<br>
       <b>Статус:</b> ${esc(responseStatusName(x.status))}<br>
       ${x.deal_id ? `<b>Сделка:</b> #${esc(x.deal_id)}<br><button class="moreBtn" onclick="loadMyDeals(\'${esc(x.deal_id)}\')">🤝 Открыть сделку</button>` : ""}
     </div>
   `).join("");
 } else {
   html += '<div class="cargoItem">Вы пока не откликались на грузы</div>';
 }

 box.innerHTML=html;
}


async function loadMyDeals(targetDealId){
 const box=document.getElementById("dealsList");
 if(!box){status("❌ Блок сделок не найден");return;}
 const cargoBox=document.getElementById("cargoList");
 const cargoDetail=document.getElementById("cargoDetail");
 const token=localStorage.getItem("dalnoboy_token");

 if(!token){
   status("❌ Нужно войти заново");
   return;
 }

 if(cargoBox){cargoBox.style.display="none";}
 if(cargoDetail){cargoDetail.style.display="none";cargoDetail.innerHTML="";}

 box.style.display="block";
 box.innerHTML='<div class="cargoItem">Загружаю сделки...</div>';

 const r=await fetch("/api/app/my-deals",{
   headers:{Authorization:"Bearer "+token}
 });

 const d=await r.json();

 if(!d.success){
   box.innerHTML='<div class="cargoItem">❌ Не удалось загрузить сделки</div>';
   status("❌ Ошибка загрузки сделок");
   return;
 }

 const deals=d.deals || [];

 if(!deals.length){
   box.innerHTML='<div class="cargoItem">Сделок пока нет</div>';
   return;
 }

 box.innerHTML=deals.map(x=>`
   <div class="cargoItem" id="deal_${esc(x.id)}" style="${targetDealId && String(x.id)===String(targetDealId) ? 'border:2px solid #22c55e' : ''}">
     <div class="cargoTitle">🤝 Сделка #${esc(x.id)}<br>${esc(x.from_city || "—")} → ${esc(x.to_city || "—")}</div>
     <div class="cargoMeta">
       Роль: ${esc(dealSideName(x.side))}<br>
       Заказчик: ${esc(x.shipper_name || "—")}<br>
       Перевозчик: ${esc(x.carrier_name || "—")}<br>
       💰 ${esc(x.client_price || x.carrier_price || x.cargo_price || "—")} ${esc(x.price_currency || "RUB")}
     </div>
     <span class="badge">${esc(dealStatusName(x.status))}</span>
     <details class="cargoDetails" ${targetDealId && String(x.id)===String(targetDealId) ? 'open' : ''}>
       <summary>Подробнее</summary>
       <div class="cargoDetailsBody">
         <b>Груз:</b> #${esc(x.cargo_id || "—")}<br>
         <b>Машина:</b> #${esc(x.truck_id || "—")}<br>
         <b>Статус:</b> ${esc(dealStatusName(x.status))}<br>
         <b>Безопасная сделка:</b> ${esc(dealSafeName(x.safe_deal_status))}<br>
         <b>Оплата:</b> ${esc(dealPaymentName(x.payment_status))}<br><br>
         ${x.side==="shipper" && ["delivered","done"].includes(x.status) ? `<button class="moreBtn" onclick="closeDealWeb('${esc(x.id)}')">&#9989; Закрыть доставку</button>` : ""}
         ${x.side==="shipper" && !x.my_review_id && ["delivered","done","closed"].includes(x.status) ? `<button class="moreBtn" onclick="reviewDealWeb('${esc(x.id)}')">&#11088; Оценить перевозчика</button>` : ""}
         ${x.carrier_user_id ? `<button class="moreBtn" onclick="showCarrierProfileWeb(\'${esc(x.carrier_user_id)}\')">Профиль перевозчика</button>` : ""}
         <button class="moreBtn" onclick="loadDealTimeline('${esc(x.id)}')">📍 Таймлайн</button>
         <a class="moreBtn" href="https://t.me/dalnoboybros_bot?start=dealchat_${esc(x.id)}" target="_blank" rel="noopener">💬 Чат в боте</a>
         <div id="timeline_${esc(x.id)}" class="cargoDetailsBody" style="display:none;margin-top:8px"></div>
       </div>
     </details>
   </div>
 `).join("");

 if(targetDealId){
   setTimeout(()=>{
     const el=document.getElementById("deal_"+targetDealId);
     if(el){el.scrollIntoView({behavior:"smooth",block:"center"});}
   },200);
 }
}




async function closeDealWeb(id){
 const token=localStorage.getItem("dalnoboy_token");

 if(!token){
   status("\u274c \u041d\u0443\u0436\u043d\u043e \u0432\u043e\u0439\u0442\u0438 \u0437\u0430\u043d\u043e\u0432\u043e");
   return;
 }

 if(!confirm("\u0417\u0430\u043a\u0440\u044b\u0442\u044c \u0434\u043e\u0441\u0442\u0430\u0432\u043a\u0443 \u043f\u043e \u0441\u0434\u0435\u043b\u043a\u0435 #"+id+"?")){
   return;
 }

 const r=await fetch("/api/app/deal-close",{
   method:"POST",
   headers:{
     "Content-Type":"application/json",
     Authorization:"Bearer "+token
   },
   body:JSON.stringify({deal_id:id})
 });

 const d=await r.json();

 if(!d.success){
   status("\u274c \u041d\u0435 \u0443\u0434\u0430\u043b\u043e\u0441\u044c \u0437\u0430\u043a\u0440\u044b\u0442\u044c: "+(d.error||"error"));
   return;
 }

 status("\u2705 \u0414\u043e\u0441\u0442\u0430\u0432\u043a\u0430 \u0437\u0430\u043a\u0440\u044b\u0442\u0430");
 await loadMyDeals();
}



async function reviewDealWeb(id){
 const token=localStorage.getItem("dalnoboy_token");

 if(!token){
   status("\u274c \u041d\u0443\u0436\u043d\u043e \u0432\u043e\u0439\u0442\u0438 \u0437\u0430\u043d\u043e\u0432\u043e");
   return;
 }

 const scoreRaw=prompt("\u041e\u0446\u0435\u043d\u043a\u0430 \u043f\u0435\u0440\u0435\u0432\u043e\u0437\u0447\u0438\u043a\u0430 1-5");
 if(scoreRaw===null){return;}

 const score=parseInt(scoreRaw,10);
 if(!score || score<1 || score>5){
   status("\u274c \u041e\u0446\u0435\u043d\u043a\u0430 \u0434\u043e\u043b\u0436\u043d\u0430 \u0431\u044b\u0442\u044c \u043e\u0442 1 \u0434\u043e 5");
   return;
 }

 const comment=prompt("\u0422\u0435\u043a\u0441\u0442 \u043e\u0442\u0437\u044b\u0432\u0430");
 if(comment===null){return;}

 if(comment.trim().length<3){
   status("\u274c \u041e\u0442\u0437\u044b\u0432 \u0441\u043b\u0438\u0448\u043a\u043e\u043c \u043a\u043e\u0440\u043e\u0442\u043a\u0438\u0439");
   return;
 }

 const r=await fetch("/api/app/deal-review",{
   method:"POST",
   headers:{
     "Content-Type":"application/json",
     Authorization:"Bearer "+token
   },
   body:JSON.stringify({deal_id:id,score:score,comment:comment.trim()})
 });

 const d=await r.json();

 if(!d.success){
   status("\u274c \u041e\u0442\u0437\u044b\u0432 \u043d\u0435 \u0441\u043e\u0445\u0440\u0430\u043d\u0451\u043d: "+(d.error||"error"));
   return;
 }

 status("\u2705 \u041e\u0442\u0437\u044b\u0432 \u0441\u043e\u0445\u0440\u0430\u043d\u0451\u043d");
 await loadMyDeals();
}



async function loadDealTimeline(id){
 const token=localStorage.getItem("dalnoboy_token");
 const box=document.getElementById("timeline_"+id);

 if(!token){
   status("❌ Нужно войти заново");
   return;
 }

 if(!box){
   status("❌ Блок таймлайна не найден");
   return;
 }

 box.style.display="block";
 box.innerHTML="Загружаю таймлайн...";

 const r=await fetch("/api/app/deal-timeline?deal_id="+encodeURIComponent(id),{
   headers:{Authorization:"Bearer "+token}
 });

 const d=await r.json();

 if(!d.success){
   box.innerHTML="❌ Не удалось загрузить таймлайн";
   status("❌ Ошибка таймлайна");
   return;
 }

 const list=d.timeline || [];

 if(!list.length){
   box.innerHTML="Истории статусов пока нет";
   return;
 }

 box.innerHTML=list.map(x=>{
   const dt=(x.created_at || "").replace("T"," ").slice(0,16);
   return "📍 <b>"+esc(dealStatusName(x.status))+"</b><br>"+
          "<span class='cargoMeta'>"+esc(x.created_by_name || "—")+" · "+esc(dt)+"</span><br><br>";
 }).join("");
}




async function showCarrierProfileWeb(userId){
 const token=localStorage.getItem("dalnoboy_token");
 const box=document.getElementById("cargoDetail");

 if(!token){
   status("Нужно войти заново");
   return;
 }

 box.style.display="block";
 box.innerHTML="Загрузка профиля перевозчика...";

 const r=await fetch("/api/app/carrier-profile?user_id="+encodeURIComponent(userId),{
   headers:{Authorization:"Bearer "+token}
 });

 const d=await r.json();

 if(!d.success){
   box.innerHTML="Ошибка загрузки профиля";
   status("Ошибка профиля");
   return;
 }

 const p=d.profile || {};
 const st=d.stats || {};
 const reviews=d.reviews || [];

 let html="<b>Профиль перевозчика</b><br><br>"+
   "<b>Имя:</b> "+esc(p.full_name || "-")+"<br>"+
   "<b>Роль:</b> "+esc(p.role || "-")+"<br>"+
   "<b>Проверка:</b> "+(p.verified ? "да" : "нет")+"<br>"+
   "<b>Тариф:</b> "+esc(p.plan_type || "free")+"<br><br>"+
   "<b>Рейтинг:</b> "+esc(st.avg_score || "нет оценок")+"<br>"+
   "<b>Отзывов:</b> "+esc(st.reviews_count || 0)+"<br>"+
   "<b>Жалоб:</b> "+esc(st.complaints_count || 0)+"<br>"+
   "<b>Закрытых сделок:</b> "+esc(d.deals_done || 0)+"<br><br>";

 if(reviews.length){
   html += "<b>Последние отзывы:</b><br>";
   html += reviews.map(x=>{
     const mark=(x.is_complaint || x.overall_score<=2) ? "!" : "*";
     return mark+" "+esc(x.overall_score)+" - "+esc(x.comment || "Без комментария")+"<br>";
   }).join("");
 } else {
   html += "Отзывов пока нет<br>";
 }

 html += '<br><button onclick="hideCargoDetail()">Закрыть</button>';
 box.innerHTML=html;
}


function showCargoDetail(id){
 const box=document.getElementById("cargoDetail");
 const c=appCargo.find(x=>String(x.id)===String(id));

 if(!c){
   status("❌ Груз не найден");
   return;
 }

 box.style.display="block";
 box.innerHTML=
   "<b>📦 Груз #"+esc(c.id)+"</b><br><br>"+

   "<b>Описание:</b><br>"+esc(c.description || "Без описания")+"<br><br>"+
   "<b>Цена:</b> "+esc(c.price_amount)+" "+esc(c.price_currency || "RUB")+"<br>"+
   "<b>Расстояние:</b> "+esc(c.distance_km || "—")+" км<br>"+
   "<b>Ставка:</b> "+esc(c.rate_per_km || "—")+" ₽/км<br>"+
   "<b>Статус:</b> "+esc(humanStatus(c.status))+"<br><br>"+
   '<button onclick="hideCargoDetail()">Закрыть</button>';
}

function hideCargoDetail(){
 const box=document.getElementById("cargoDetail");
 box.style.display="none";
 box.innerHTML="";
}

function show(data){
 document.getElementById("loginBox").style.display="none";
 document.getElementById("profile").style.display="block";
 fullName.textContent=data.user.full_name||"—";
 role.textContent=data.user.role||"—";
 plan.textContent=data.user.plan_type||"—";
 telegramId.textContent=data.user.telegram_id||"—";
 status("✅ Вход выполнен");
 renderActions(data.user.role);
}
async function login(){
 const code=document.getElementById("code").value.trim();
 if(!code){status("Введите код");return}
 const r=await fetch("/api/app/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({code})});
 const d=await r.json();
 if(!d.success){status("❌ "+(d.error||"Ошибка входа"));return}
 localStorage.setItem("dalnoboy_token",d.token);
 show(d);
}
async function check(){
 const token=localStorage.getItem("dalnoboy_token");
 if(!token)return;
 const r=await fetch("/api/app/me",{headers:{Authorization:"Bearer "+token}});
 const d=await r.json();
 if(!d.success){localStorage.removeItem("dalnoboy_token");return}
 show(d);
}
function logout(){localStorage.removeItem("dalnoboy_token");location.reload()}
check();
