<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>Кабинет диспетчера — Dalnoboy</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
:root{
  --bg:#0f172a;
  --bg2:#111827;
  --panel:rgba(30,41,59,.78);
  --card:rgba(15,23,42,.82);
  --line:rgba(148,163,184,.22);

  --primary:#6366f1;
  --secondary:#8b5cf6;
  --electric:#38bdf8;

  --success:#22c55e;
  --warning:#f59e0b;
  --danger:#ef4444;

  --text:#f8fafc;
  --muted:#94a3b8;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Inter,Arial,Helvetica,sans-serif;
  background:
    radial-gradient(circle at top left, rgba(99,102,241,.28), transparent 32%),
    radial-gradient(circle at top right, rgba(56,189,248,.18), transparent 28%),
    linear-gradient(135deg,#020617,#0f172a 45%,#111827);
  color:var(--text);
  min-height:100vh;
}

header{
  background:rgba(2,6,23,.74);
  backdrop-filter:blur(18px);
  color:white;
  padding:20px 28px;
  display:flex;
  align-items:center;
  gap:16px;
  border-bottom:1px solid rgba(148,163,184,.18);
  box-shadow:0 12px 35px rgba(0,0,0,.25);
}

header img{
  width:64px;
  height:64px;
  border-radius:20px;
  object-fit:cover;
  box-shadow:0 0 0 2px rgba(255,255,255,.08),0 16px 40px rgba(99,102,241,.35);
}

.wrap{
  padding:14px;
  max-width:1540px;
  margin:0 auto;
}

.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(190px,1fr));
  gap:18px;
  margin-bottom:26px;
}

.card{
  position:relative;
  overflow:hidden;
  background:linear-gradient(145deg,rgba(30,41,59,.9),rgba(15,23,42,.86));
  border:1px solid rgba(148,163,184,.18);
  border-radius:24px;
  padding:14px;
  box-shadow:0 22px 60px rgba(0,0,0,.22);
}

.card:before{
  content:"";
  position:absolute;
  inset:-1px;
  background:linear-gradient(135deg,rgba(99,102,241,.32),transparent 45%,rgba(56,189,248,.18));
  opacity:.55;
  pointer-events:none;
}

.card .num{
  position:relative;
  font-size:31px;
  font-weight:900;
  margin-top:11px;
  color:#fff;
  letter-spacing:-.04em;
}

h2{
  margin:32px 0 14px;
  font-size:22px;
  color:#fff;
  display:flex;
  align-items:center;
  gap:10px;
}

h2:after{
  content:"";
  height:1px;
  flex:1;
  background:linear-gradient(90deg,rgba(99,102,241,.8),transparent);
}

table{
  width:100%;
  border-collapse:separate;
  border-spacing:0;
  background:rgba(15,23,42,.72);
  border:1px solid rgba(148,163,184,.18);
  border-radius:24px;
  overflow:hidden;
  box-shadow:0 24px 70px rgba(0,0,0,.22);
  backdrop-filter:blur(14px);
}

th{
  background:linear-gradient(90deg,rgba(99,102,241,.38),rgba(56,189,248,.16));
  color:#e0e7ff;
  padding:14px;
  text-align:left;
  font-size:12px;
  text-transform:uppercase;
  letter-spacing:.08em;
  border-bottom:1px solid rgba(148,163,184,.18);
}

td{
  padding:14px;
  border-bottom:1px solid rgba(148,163,184,.12);
  font-size:14px;
  vertical-align:top;
  color:#e5e7eb;
}

tr:hover td{
  background:rgba(99,102,241,.08);
}

.muted{color:var(--muted)}

.btn{
  display:inline-block;
  border:0;
  cursor:pointer;
  padding:9px 13px;
  border-radius:12px;
  background:linear-gradient(135deg,var(--primary),var(--secondary));
  color:white;
  text-decoration:none;
  font-weight:800;
  box-shadow:0 12px 30px rgba(99,102,241,.25);
}

.btn:hover{
  transform:translateY(-1px);
  filter:brightness(1.08);
}

.status-pill{
  display:inline-block;
  padding:7px 11px;
  border-radius:999px;
  font-weight:900;
  font-size:13px;
}

.risk-low{background:rgba(34,197,94,.16);color:#86efac;border:1px solid rgba(34,197,94,.35)}
.risk-mid{background:rgba(245,158,11,.16);color:#fcd34d;border:1px solid rgba(245,158,11,.35)}
.risk-high{background:rgba(239,68,68,.16);color:#fca5a5;border:1px solid rgba(239,68,68,.35)}

#dealModal,#clientModal{
  background:
    radial-gradient(circle at top right, rgba(99,102,241,.2), transparent 28%),
    rgba(15,23,42,.97) !important;
  color:var(--text);
  border-left:1px solid rgba(56,189,248,.5);
  box-shadow:-30px 0 90px rgba(0,0,0,.55) !important;
}

#dealModal h2,#clientModal h2,
#dealModal h3,#clientModal h3{
  color:white;
}

#dealModal p,#clientModal p{
  color:#e5e7eb;
}

#dealModal button,#clientModal button{
  color:white;
}

#dealModal img,#clientModal img{
  box-shadow:0 18px 60px rgba(0,0,0,.35);
}

.tabs{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin:0 0 22px 0;
}

.tab-btn{
  border:1px solid rgba(148,163,184,.22);
  background:rgba(15,23,42,.72);
  color:#e5e7eb;
  padding:10px 14px;
  border-radius:14px;
  cursor:pointer;
  font-weight:800;
}

.tab-btn.active{
  background:linear-gradient(135deg,var(--primary),var(--secondary));
  color:#fff;
  box-shadow:0 12px 30px rgba(99,102,241,.25);
}

.tab-section{
  display:none;
}

.tab-section.active{
  display:block;
}
</style>
</head>
<body>
<header><img src="/assets/logo.png" style="width:54px;height:54px;border-radius:14px;object-fit:cover"><div>Dalnoboy Bros<br><span style="font-size:13px;font-weight:400;color:#cbd5e1">Безопасные перевозки и сделки</span></div></header>

<div id="app" class="wrap">
  Загрузка...
</div>

<script>
const allowedBrowserIds = [8612087868, 8253347001];

const params = new URLSearchParams(location.search);
const devId = Number(params.get("dev"));

if (!allowedBrowserIds.includes(devId)) {
  document.getElementById("app").innerHTML = `
    <div class="bad">
      <h2>Доступ закрыт</h2>
      <p>Откройте кабинет по персональной ссылке диспетчера.</p>
    </div>
  `;
  throw new Error("no dispatcher access");
}

function money(v) {
  if (!v) return "-";
  return Number(v).toLocaleString("ru-RU") + " ₽";
}

async function load() {
  const [cargoRes, trucksRes, dealsRes, disputesRes, clientsRes] = await Promise.all([
    fetch("/api/cargo/open"),
    fetch("/api/trucks/active"),
    fetch("/api/deals"),
    fetch("/api/disputes"),
    fetch("/api/dispatcher/clients")
  ]);

  const cargo = await cargoRes.json();
  const trucks = await trucksRes.json();
  const deals = await dealsRes.json();
  const disputes = await disputesRes.json();
  const clients = await clientsRes.json();

  window.cargoItems = cargo.items || [];
  window.truckItems = trucks.items || [];
  window.dealItems = deals.items || [];
  window.disputeItems = disputes.items || [];
  window.clientItems = clients.items || [];

  const cargoItems = window.cargoItems;
  const truckItems = window.truckItems;
  const dealItems = window.dealItems;
  const disputeItems = window.disputeItems;
  const clientItems = window.clientItems;

  const profitTotal = dealItems.reduce((sum,d) => sum + Number(d.dispatcher_profit || 0), 0);
  const today = new Date().toISOString().slice(0,10);
  const profitToday = dealItems
    .filter(d => String(d.created_at || "").slice(0,10) === today)
    .reduce((sum,d) => sum + Number(d.dispatcher_profit || 0), 0);

  document.getElementById("app").innerHTML = `
    <div class="tabs">
      <button class="tab-btn active" onclick="showTab('overview', this)">📊 Обзор</button>
      <button class="tab-btn" onclick="showTab('cargo', this)">📦 Грузы</button>
      <button class="tab-btn" onclick="showTab('trucks', this)">🚚 Машины</button>
      <button class="tab-btn" onclick="showTab('deals', this)">🤝 Сделки</button>
      <button class="tab-btn" onclick="showTab('clients', this)">👥 Клиенты</button>
      <button class="tab-btn" onclick="showTab('disputes', this)">⚖️ Споры</button>
      <a class="tab-btn" href="/?dev=${devId}">🗺 Карта</a>
    </div>

    <section id="tab-overview" class="tab-section active">
    <div class="cards">
      <div class="card">📦 Открытые грузы<div class="num">${cargoItems.length}</div></div>
      <div class="card">🚚 Активные машины<div class="num">${truckItems.length}</div></div>
      <div class="card">🤝 Сделки<div class="num">${dealItems.length}</div></div>
      <div class="card">💰 Прибыль сегодня<div class="num">${money(profitToday)}</div></div>
      <div class="card">💼 Прибыль всего<div class="num">${money(profitTotal)}</div></div>
      <div class="card">⚠️ Споры<div class="num">${disputeItems.length}</div></div>
      <div class="card">👥 Клиенты<div class="num">${clientItems.length}</div></div>
    </div>
    </section>

    <section id="tab-cargo" class="tab-section">
    <h2>📦 Грузы</h2>
    <table>
      <thead>
        <tr>
          <th>ID</th><th>Маршрут</th><th>Цена</th><th>Ставка</th><th>Статус</th>
        </tr>
      </thead>
      <tbody>
        ${cargoItems.map(c => `
          <tr>
            <td>#${c.id}</td>
            <td>${c.from_city || "-"} → ${c.to_city || "-"}</td>
            <td>${money(c.price_amount)}</td>
            <td>${c.rate_per_km ? c.rate_per_km + " ₽/км" : "-"}</td>
            <td>${c.status || "open"}</td>
          </tr>
        `).join("") || `<tr><td colspan="5" class="muted">Грузов пока нет</td></tr>`}
      </tbody>
    </table>
    </section>

    <section id="tab-trucks" class="tab-section">
    <h2>🚚 Машины</h2>
    <table>
      <thead>
        <tr>
          <th>ID</th><th>Перевозчик</th><th>Статус</th><th>Последняя активность</th>
        </tr>
      </thead>
      <tbody>
        ${truckItems.map(t => `
          <tr>
            <td>#${t.id}</td>
            <td>Перевозчик #${t.driver_id}</td>
            <td>${t.online_status || "-"}</td>
            <td>${t.location_updated_at ? new Date(t.location_updated_at).toLocaleString("ru-RU") : "-"}</td>
          </tr>
        `).join("") || `<tr><td colspan="4" class="muted">Активных машин пока нет</td></tr>`}
      </tbody>
    </table>
    </section>

    <section id="tab-deals" class="tab-section">
    <h2>🤝 Сделки</h2>
    <table>
      <thead>
        <tr><th>ID</th><th>Груз</th><th>Машина</th><th>Статус</th><th>Действие</th></tr>
      </thead>
      <tbody>
        ${dealItems.map(d => `
          <tr>
            <td>#${d.id}</td>
            <td>#${d.cargo_id} · ${d.from_city || "-"} → ${d.to_city || "-"}</td>
            <td>${d.driver_name ? "Перевозчик: " + d.driver_name : "Машина #" + (d.truck_id || "-")}</td>
            <td>${d.status || "-"}</td>
            <td><button class="btn" onclick="openDeal(${d.id})">👁 Открыть</button></td>
          </tr>
        `).join("") || `<tr><td colspan="4" class="muted">Сделок пока нет</td></tr>`}
      </tbody>
    </table>
    </section>

    <section id="tab-clients" class="tab-section">
    <h2>👥 Клиенты</h2>
    <table>
      <thead>
        <tr><th>ID</th><th>Клиент</th><th>Тип</th><th>Доверие</th><th>Комиссия</th><th>Статус</th><th>Действие</th></tr>
      </thead>
      <tbody>
        ${clientItems.map(c => `
          <tr>
            <td>#${c.id}</td>
            <td>${c.full_name || "Клиент #" + c.client_user_id}</td>
            <td>${c.client_type || c.role || "-"}</td>
            <td>${c.trust_score || 50}/100</td>
            <td>${c.commission_percent || 0}%</td>
            <td>${c.status || "-"}</td>
            <td><button class="btn" onclick="openClient(${c.id})">👁 Открыть</button></td>
          </tr>
        `).join("") || `<tr><td colspan="6" class="muted">Клиентов пока нет</td></tr>`}
      </tbody>
    </table>
    </section>

    <section id="tab-disputes" class="tab-section">
    <h2>⚖️ Споры</h2>
    <table>
      <thead>
        <tr><th>ID</th><th>Сделка</th><th>Причина</th><th>Открыл</th><th>Статус</th></tr>
      </thead>
      <tbody>
        ${disputeItems.map(x => `
          <tr>
            <td>#${x.id}</td>
            <td>Сделка #${x.deal_id}<br><span class="muted">${(x.from_city||"-").split(",")[0]} → ${(x.to_city||"-").split(",")[0]}</span></td>
            <td>${x.reason || "-"}</td>
            <td>${x.opened_by_name || "Пользователь #" + (x.opened_by || "-")}</td>
            <td>${x.status || "-"}</td>
          </tr>
        `).join("") || `<tr><td colspan="5" class="muted">Споров пока нет</td></tr>`}
      </tbody>
    </table>
    </section>
  `;
  restoreTab();
}

load().catch(e => {
  document.getElementById("app").innerHTML =
    "<div class='bad'><h2>Ошибка загрузки</h2><p>" + e.message + "</p></div>";
});


function showTab(name, btn){
  document.querySelectorAll(".tab-section").forEach(x => x.classList.remove("active"));
  document.querySelectorAll(".tab-btn").forEach(x => x.classList.remove("active"));

  const section = document.getElementById("tab-" + name);
  if(section) section.classList.add("active");

  if(btn) btn.classList.add("active");

  localStorage.setItem("dispatcher_tab", name);
}

function restoreTab(){
  const saved = localStorage.getItem("dispatcher_tab") || "overview";
  const btn = Array.from(document.querySelectorAll(".tab-btn")).find(b => b.getAttribute("onclick") && b.getAttribute("onclick").includes("'" + saved + "'"));
  showTab(saved, btn);
}

function trustLabel(score){
  score = Number(score || 50);
  if(score >= 80) return ["🟢 Надёжный", "risk-low"];
  if(score >= 50) return ["🟡 Новый / средний риск", "risk-mid"];
  return ["🔴 Высокий риск", "risk-high"];
}

function openClient(id){
  const c = (window.clientItems || []).find(x => Number(x.id) === Number(id));
  if(!c){
    alert("Клиент не найден");
    return;
  }

  const [label, cls] = trustLabel(c.trust_score);

  const clientDeals = (window.dealItems || []).filter(d =>
    Number(d.driver_user_id || d.driver_id || 0) === Number(c.client_user_id)
    || Number(d.truck_driver_id || 0) === Number(c.client_user_id)
  );

  const clientDisputes = (window.disputeItems || []).filter(x =>
    clientDeals.some(d => Number(d.id) === Number(x.deal_id))
  );

  const clientProfit = clientDeals.reduce((sum,d)=>sum + Number(d.dispatcher_profit || 0), 0);

  const clientTrucks = (window.truckItems || []).filter(t =>
    Number(t.driver_id || 0) === Number(c.client_user_id)
  );

  let box=document.getElementById("clientModal");
  if(box) box.remove();

  box=document.createElement("div");
  box.id="clientModal";
  box.style=`
    position:fixed;
    right:0;
    top:0;
    width:min(440px, 92vw);
    height:100%;
    z-index:99999;
    overflow-y:auto;overflow-x:hidden;
    padding:14px;
  `;

  box.innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:center">
      <h2>👥 Клиент #${c.id}</h2>
      <button class="btn" onclick="clientModal.remove()">✖</button>
    </div>

    <div style="
      display:flex;
      align-items:center;
      gap:14px;
      margin:18px 0;
      padding:16px;
      border-radius:22px;
      background:linear-gradient(135deg,rgba(99,102,241,.18),rgba(56,189,248,.10));
      border:1px solid rgba(148,163,184,.22);
    ">
      <img src="/assets/logo.png" style="width:72px;height:72px;border-radius:20px;object-fit:cover">
      <div>
        <b style="font-size:22px">${c.full_name || "Клиент #" + c.client_user_id}</b><br>
        <span class="muted">Dalnoboy Bros · CRM диспетчера</span><br>
        <span class="status-pill ${cls}" style="margin-top:8px">${label}</span>
      </div>
    </div>

    <div style="
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
      margin:14px 0;
    ">
      <div class="card"><span class="muted">🤝 Сделки</span><div class="num">${clientDeals.length}</div></div>
      <div class="card"><span class="muted">⚖️ Споры</span><div class="num">${clientDisputes.length}</div></div>
      <div class="card"><span class="muted">💰 Доход</span><div class="num">${money(clientProfit)}</div></div>
      <div class="card"><span class="muted">🚚 Машины</span><div class="num">${clientTrucks.length}</div></div>
    </div>

    <div style="background:rgba(15,23,42,.45);padding:16px;border-radius:18px;margin:14px 0;border:1px solid rgba(148,163,184,.18)">
      <h3 style="margin-top:0">⭐ Индекс доверия</h3>
      <p style="font-size:34px;font-weight:900;margin:8px 0">${c.trust_score || 50}/100</p>
      <p><b>Тип:</b> ${c.client_type || c.role || "-"}</p>
      <p><b>Статус:</b> ${c.status || "-"}</p>
      <p><b>Комиссия диспетчера:</b> ${c.commission_percent || 0}%</p>
      <p class="muted">Персональные данные и документы не раскрываются. Показываем только статус проверки, рейтинг и историю работы.</p>
    </div>

    <div style="background:rgba(34,197,94,.10);padding:16px;border-radius:18px;margin:14px 0;border:1px solid rgba(34,197,94,.25)">
      <h3 style="margin-top:0">🛡 Защита платформы</h3>
      <p>✅ Контакты открываются только по правилам безопасной сделки</p>
      <p>✅ Все действия пишутся в журнал</p>
      <p>✅ Споры влияют на индекс доверия</p>
    </div>

    <h3>📝 Заметка диспетчера</h3>

    <textarea id="clientNoteText" style="
      width:100%;
      min-height:110px;
      border-radius:14px;
      padding:12px;
      border:1px solid rgba(148,163,184,.25);
      background:rgba(15,23,42,.45);
      color:#fff;
      resize:vertical;
    ">${c.note || ""}</textarea>

    <button class="btn" style="margin-top:10px" onclick="saveClientNote(${c.id})">
      💾 Сохранить заметку
    </button>

    <hr>

    <h3>🚚 Машины клиента</h3>
    ${
      clientTrucks.length
      ?
      clientTrucks.map(t=>`
        <div style="padding:12px;border-bottom:1px solid rgba(148,163,184,.18)">
          <b>Машина #${t.id}</b><br>
          ${t.body_type || "-"} · ${t.capacity_tons || "-"} т · ${t.volume_m3 || "-"} м³
        </div>
      `).join("")
      :
      "<p class='muted'>Машин пока нет или они не привязаны.</p>"
    }

    <h3>🤝 Сделки клиента</h3>
    ${
      clientDeals.length
      ?
      clientDeals.map(d=>`
        <div style="padding:12px;border-bottom:1px solid rgba(148,163,184,.18)">
          <b>Сделка #${d.id}</b><br>
          ${(d.from_city||"-").split(",")[0]} → ${(d.to_city||"-").split(",")[0]}<br>
          <span class="muted">Статус: ${d.status || "-"} · Доход: ${money(d.dispatcher_profit)}</span>
        </div>
      `).join("")
      :
      "<p class='muted'>Сделок пока нет.</p>"
    }
  `;

  document.body.append(box);
}

async function saveClientNote(id){
  const el = document.getElementById("clientNoteText");
  const note = el ? el.value : "";

  const res = await fetch("/api/dispatcher/client/" + id + "/note", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({ note })
  });

  const data = await res.json();

  if(!data.success){
    alert("Ошибка сохранения заметки");
    return;
  }

  const c = (window.clientItems || []).find(x => Number(x.id) === Number(id));
  if(c) c.note = note;

  alert("✅ Заметка сохранена");
}

async function setDealStatus(id,status){
  await fetch("/api/deal/"+id+"/status",{
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({status})
  });

  openDeal(id);
  location.reload();
}

async function openDeal(id){

const res=await fetch("/api/deal/"+id);
const data=await res.json();

const auditRes = await fetch("/api/deal/" + id + "/audit");
const auditData = await auditRes.json();
const auditItems = auditData.items || [];

const docsRes = await fetch("/api/deal/" + id + "/documents");
const docsData = await docsRes.json();
const docItems = docsData.items || [];

if(!data.success){
alert("Сделка не найдена");
return;
}

const d=data.deal;
const history=data.history||[];

let box=document.getElementById("dealModal");

if(box) box.remove();

box=document.createElement("div");

box.id="dealModal";

box.style=`
position:fixed;
right:0;
top:0;
width:min(440px, 92vw);
height:100%;
background:white;
z-index:99999;
overflow-y:auto;overflow-x:hidden;
box-shadow:-10px 0 30px rgba(0,0,0,.2);
padding:14px;
`;

box.innerHTML=`
<div style="display:flex;justify-content:space-between">

<h2>🤝 Сделка #${d.id}</h2>

<button onclick="dealModal.remove()">✖</button>

</div>

<p><b>Маршрут</b><br>
${(d.from_city||"-").split(",")[0]}
→
${(d.to_city||"-").split(",")[0]}</p>

<p><b>Цена груза</b><br>
${money(d.price_amount)}</p>

<div style="background:rgba(255,255,255,.06);padding:14px;border-radius:12px;margin:14px 0;border:1px solid rgba(148,163,184,.18)">
  <h3 style="margin-top:0">💰 Финансы сделки</h3>
  <p><b>Клиент платит:</b> ${money(d.client_price)}</p>
  <p><b>Перевозчику:</b> ${money(d.carrier_price)}</p>
  <p><b>Прибыль диспетчера:</b> ${money(d.dispatcher_profit)}</p>
</div>

<p><b>Перевозчик</b><br>
${d.driver_name||"-"}</p>

${
d.truck_photo_url
?
`<img src="${d.truck_photo_url}" style="
  width:100%;
  max-height:140px;
  object-fit:cover;
  border-radius:16px;
  margin:10px 0;
  box-shadow:0 2px 12px rgba(0,0,0,.15);
">`
:
`<div style="
  background:#f3f4f6;
  padding:18px;
  border-radius:14px;
  margin:10px 0;
  text-align:center;
  color:#666;
">Фото машины пока нет</div>`
}

<p><b>Индекс доверия перевозчика</b><br>
${d.driver_trust_score || 50} / 100</p>

<div style="background:rgba(99,102,241,.12);border:1px solid rgba(99,102,241,.35);padding:12px;border-radius:14px;margin:12px 0">
  <h3 style="margin-top:0">

<div style="background:rgba(99,102,241,.12);border:1px solid rgba(99,102,241,.35);padding:12px;border-radius:14px;margin:12px 0">
  <h3 style="margin-top:0">📝 Заметка диспетчера</h3>
  <p>${d.dispatcher_client_note || "Заметки по перевозчику пока нет"}</p>
</div>

<p><b>Статус</b><br>
<span style="
padding:6px 12px;
background:rgba(99,102,241,.25);color:#fff;
border-radius:10px">
${d.status}
</span></p>

<div style="background:rgba(34,197,94,.12);padding:14px;border-radius:12px;margin:14px 0;border:1px solid rgba(34,197,94,.25)">
  <h3 style="margin-top:0">🛡 Безопасная сделка</h3>
  <p><b>Статус:</b> ${d.safe_deal_status || "draft"}</p>
  <p>📦 Заказчик: ${d.shipper_confirmed ? "✅ подтверждено" : "❌ нет"}</p>
  <p>🚚 Перевозчик: ${d.carrier_confirmed ? "✅ подтверждено" : "❌ нет"}</p>
  <p>👨‍💼 Диспетчер: ${d.dispatcher_confirmed ? "✅ подтверждено" : "❌ нет"}</p>
  <p>💳 Оплата: ${d.payment_status || "pending"}</p>
</div>

<div style="display:flex;gap:8px;flex-wrap:wrap">

<button class="btn"
onclick="setDealStatus(${d.id},'in_progress')">

📍 В пути

</button>

<button class="btn"

onclick="setDealStatus(${d.id},'done')">

✅ Доставлено

</button>

<button class="btn"

style="background:#c62828"

onclick="setDealStatus(${d.id},'cancelled')">

❌ Отменить

</button>

</div>

<hr>

<h3>📄 Документы сделки</h3>

${
docItems.length
?
docItems.map(doc=>`
<div style="padding:10px;border-bottom:1px solid #eee">
  <b>${doc.file_name || doc.doc_type}</b><br>
  Тип: ${doc.doc_type}<br>
  Загрузил: ${doc.uploaded_by_name || "Пользователь #" + (doc.uploaded_by || "-")}<br>
  <small>${new Date(doc.created_at).toLocaleString("ru-RU")}</small>
</div>
`).join("")
:
"<p>Документов пока нет</p>"
}

<hr>

<h3>📜 Журнал действий</h3>

${
auditItems.length
?
auditItems.map(a=>`
<div style="
padding:10px;
border-bottom:1px solid #eee">

<b>${a.full_name || "Пользователь #" + (a.user_id || "-")}</b><br>
${a.action}<br>
${a.old_value ? a.old_value + " → " : ""}${a.new_value || ""}

<br>

<small>
${new Date(a.created_at).toLocaleString("ru-RU")}
</small>

</div>
`).join("")
:
"<p>Журнал пуст</p>"
}

<hr>

<h3>История статусов</h3>

${
history.length
?
history.map(x=>`
<div style="
padding:10px;
border-bottom:1px solid #eee">

${x.status}

<br>

<small>

${new Date(x.created_at).toLocaleString("ru-RU")}

</small>

</div>
`).join("")
:
"<p>Пока пусто</p>"
}
`;

document.body.append(box);

}
</script>
</body>
</html>
